version: '3.8'

services:
  sentiment-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
      - RUST_LOG=info
    volumes:
      - ./models:/app/models
      - ./sentiment_predictor.py:/app/sentiment_predictor.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
